apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-actions
  namespace: gitea-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-app-deployer
  namespace: demo-app
rules:
  - apiGroups: ["", "apps"]
    resources: ["configmaps", "deployments", "pods", "pods/log", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitea-actions-demo-app
  namespace: demo-app
subjects:
  - kind: ServiceAccount
    name: gitea-actions
    namespace: gitea-runner
roleRef:
  kind: Role
  name: demo-app-deployer
  apiGroup: rbac.authorization.k8s.io
