apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-web-content
  namespace: demo-app
data:
  index.html: |
    <!doctype html>
    <html>
      <head><title>Gitea Actions Demo</title></head>
      <body>
        <h1>Deployed by Gitea Actions</h1>
        <p>Application: demo-app</p>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
  namespace: demo-app
  labels:
    app.kubernetes.io/name: demo-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 2
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: web-content
          configMap:
            name: demo-web-content
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
  namespace: demo-app
spec:
  selector:
    app.kubernetes.io/name: demo-web
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
